<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TGC Voice Caddy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 4px; color: #4ade80; }
    .subtitle { color: #666; margin-bottom: 24px; font-size: 0.85rem; }

    #mic-btn {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 3px solid #2d3748;
      background: #161b22;
      color: #4ade80;
      font-size: 2.5rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    #mic-btn:hover { border-color: #4ade80; }
    #mic-btn.active {
      border-color: #22c55e;
      background: #0f2918;
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.25);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.15); }
      50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.35); }
    }

    #status {
      margin-top: 16px;
      padding: 8px 16px;
      border-radius: 6px;
      background: #161b22;
      font-size: 0.8rem;
      color: #888;
      text-align: center;
    }
    #status.connected { color: #4ade80; }
    #status.error { color: #ef4444; }

    #transcript {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #0d1117;
      border: 1px solid #1e2733;
      width: 100%;
      max-width: 460px;
      min-height: 120px;
      max-height: 280px;
      overflow-y: auto;
      font-size: 0.82rem;
      line-height: 1.7;
    }
    .msg { padding: 2px 0; }
    .user-text { color: #60a5fa; }
    .user-text::before { content: "🎙️ "; }
    .ai-text { color: #4ade80; }
    .ai-text::before { content: "🏌️ "; }
    .tool-text { color: #f59e0b; font-size: 0.75rem; opacity: 0.7; }
    .tool-text::before { content: "⚡ "; }

    .hint {
      margin-top: 16px;
      font-size: 0.72rem;
      color: #444;
      text-align: center;
      max-width: 400px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>🏌️ Voice Caddy</h1>
  <p class="subtitle">The Golf Club 2019</p>

  <button id="mic-btn" onclick="toggleMic()">🎙️</button>
  <div id="status">Tap to start</div>
  <div id="transcript"></div>
  <div class="hint">
    "Give me the 7 iron" · "Aim right 5" · "Show me the green" · "Mulligan" · "Next hole"
  </div>

  <script>
    let ws = null;
    let audioCtx = null;
    let micStream = null;
    let micProcessor = null;
    let isActive = false;
    let playbackQueue = [];
    let isPlaying = false;
    let nextPlayTime = 0;

    function setStatus(text, cls = '') {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = cls;
    }

    function addMsg(text, cls) {
      const el = document.getElementById('transcript');
      const d = document.createElement('div');
      d.className = 'msg ' + cls;
      d.textContent = text;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
      // Keep only last 30 messages
      while (el.children.length > 30) el.removeChild(el.firstChild);
    }

    async function toggleMic() {
      if (isActive) { stopSession(); } else { await startSession(); }
    }

    async function startSession() {
      try {
        setStatus('Connecting...', '');
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: { sampleRate: 24000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });
        audioCtx = new AudioContext({ sampleRate: 24000 });

        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws`);

        ws.onopen = () => {
          setStatus('🟢 Listening', 'connected');
          document.getElementById('mic-btn').classList.add('active');
          isActive = true;
          startMicCapture();
        };
        ws.onmessage = (e) => handleEvent(JSON.parse(e.data));
        ws.onerror = () => setStatus('Connection error', 'error');
        ws.onclose = () => { setStatus('Disconnected', 'error'); stopSession(); };
      } catch (err) {
        setStatus(err.message, 'error');
      }
    }

    function stopSession() {
      isActive = false;
      document.getElementById('mic-btn').classList.remove('active');
      if (micProcessor) { micProcessor.disconnect(); micProcessor = null; }
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
      if (ws) { ws.close(); ws = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      playbackQueue = []; isPlaying = false; nextPlayTime = 0;
      setStatus('Tap to start');
    }

    function startMicCapture() {
      if (!audioCtx || !micStream) return;
      const source = audioCtx.createMediaStreamSource(micStream);
      micProcessor = audioCtx.createScriptProcessor(4096, 1, 1);
      micProcessor.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const f32 = e.inputBuffer.getChannelData(0);
        const i16 = new Int16Array(f32.length);
        for (let i = 0; i < f32.length; i++) {
          const s = Math.max(-1, Math.min(1, f32[i]));
          i16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        const bytes = new Uint8Array(i16.buffer);
        let b64 = '';
        for (let i = 0; i < bytes.length; i += 8192) {
          b64 += String.fromCharCode(...bytes.subarray(i, Math.min(i + 8192, bytes.length)));
        }
        ws.send(JSON.stringify({ type: 'input_audio_buffer.append', audio: btoa(b64) }));
      };
      source.connect(micProcessor);
      micProcessor.connect(audioCtx.destination);
    }

    function handleEvent(ev) {
      switch (ev.type) {
        case 'response.audio.delta':
          if (ev.delta) scheduleAudio(ev.delta);
          break;
        case 'response.audio_transcript.done':
          if (ev.transcript) addMsg(ev.transcript, 'ai-text');
          break;
        case 'conversation.item.input_audio_transcription.completed':
          if (ev.transcript) addMsg(ev.transcript, 'user-text');
          break;
        case 'response.function_call_arguments.done':
          addMsg(`${ev.name}(${ev.arguments})`, 'tool-text');
          break;
        case 'error':
          setStatus(ev.error?.message || ev.message || 'Error', 'error');
          break;
      }
    }

    function scheduleAudio(b64) {
      if (!audioCtx) return;
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const i16 = new Int16Array(bytes.buffer);
      const f32 = new Float32Array(i16.length);
      for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 0x8000;

      const buf = audioCtx.createBuffer(1, f32.length, 24000);
      buf.getChannelData(0).set(f32);

      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);

      const now = audioCtx.currentTime;
      const start = Math.max(now, nextPlayTime);
      src.start(start);
      nextPlayTime = start + buf.duration;
    }
  </script>
</body>
</html>
